kind = "web"
previewPath = "/"
title = "Barber Hub"
version = "1.0.0"
id = "artifacts/barber-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21576

[services.development]
run = "pnpm --filter @workspace/barber-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barber-hub", "run", "build" ]
publicDir = "artifacts/barber-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21576"
BASE_PATH = "/"
